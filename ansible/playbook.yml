- name: Lab completo - GitHub Actions + Ansible + K3s + Nginx NodePort
  hosts: server
  become: true

  tasks:
    - name: Criar diretório /root/lab-github-actions
      file:
        path: /root/lab-github-actions
        state: directory
        mode: "0755"

    - name: Criar arquivo de teste
      copy:
        dest: /root/lab-github-actions/arquivo-criado-com-pipe-actions.txt
        content: "Arquivo criado pelo GitHub Actions executando Ansible\n"
        mode: "0644"

    - name: Instalar dependências básicas
      apt:
        name:
          - curl
        state: present
        update_cache: true

    - name: Verificar se o k3s já está instalado
      stat:
        path: /usr/local/bin/k3s
      register: k3s_bin

    - name: Instalar K3s
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s
      when: not k3s_bin.stat.exists

    - name: Garantir que o serviço k3s está habilitado e iniciado
      systemd:
        name: k3s
        enabled: true
        state: started

    - name: Aguardar kubeconfig do k3s
      wait_for:
        path: /etc/rancher/k3s/k3s.yaml
        timeout: 180

    - name: Verificar status do serviço k3s
      command: systemctl is-active k3s
      register: k3s_status
      changed_when: false

    - name: Mostrar status do k3s
      debug:
        msg: "Status do serviço k3s: {{ k3s_status.stdout }}"

    - name: Validar node do cluster
      command: /usr/local/bin/kubectl get nodes -o wide
      register: kubectl_nodes
      changed_when: false

    - name: Mostrar nodes do cluster
      debug:
        var: kubectl_nodes.stdout_lines

    - name: Criar manifest Kubernetes do Nginx
      copy:
        dest: /root/lab-github-actions/nginx-nodeport.yaml
        mode: "0644"
        content: |
          apiVersion: v1
          kind: Namespace
          metadata:
            name: lab
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: nginx-lab
            namespace: lab
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: nginx-lab
            template:
              metadata:
                labels:
                  app: nginx-lab
              spec:
                containers:
                  - name: nginx
                    image: nginx:stable
                    ports:
                      - containerPort: 80
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: nginx-lab
            namespace: lab
          spec:
            type: NodePort
            selector:
              app: nginx-lab
            ports:
              - protocol: TCP
                port: 80
                targetPort: 80
                nodePort: 30080

    - name: Aplicar manifest do Nginx
      command: /usr/local/bin/kubectl apply -f /root/lab-github-actions/nginx-nodeport.yaml
      register: nginx_apply
      changed_when: "'created' in nginx_apply.stdout or 'configured' in nginx_apply.stdout"

    - name: Aguardar rollout do deployment nginx-lab
      command: /usr/local/bin/kubectl -n lab rollout status deployment/nginx-lab --timeout=180s
      register: nginx_rollout
      changed_when: false

    - name: Ver pods no namespace lab
      command: /usr/local/bin/kubectl -n lab get pods -o wide
      register: nginx_pods
      changed_when: false

    - name: Mostrar pods do nginx
      debug:
        var: nginx_pods.stdout_lines

    - name: Ver service do nginx
      command: /usr/local/bin/kubectl -n lab get svc nginx-lab -o wide
      register: nginx_svc
      changed_when: false

    - name: Mostrar service do nginx
      debug:
        var: nginx_svc.stdout_lines
